name: CI Pipeline

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [17]  # Вказати версію Java
    steps:
      # Крок 1: Завантаження репозиторію
      - name: Checkout repository
        uses: actions/checkout@v3

      # Крок 2: Встановлення JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'temurin'

      # Крок 3: Запуск лінтера (Spotless для перевірки стилістичних помилок)
      - name: Run Linter (Spotless)
        run: ./mvnw spotless:check
        continue-on-error: false  # При помилці форматування зупиняється

      # Крок 4: Автоматичне виправлення форматування, якщо є помилки
      - name: Apply Formatting Fixes (Spotless)
        run: ./mvnw spotless:apply
        continue-on-error: false

      # Паралельний крок 1: Запуск тестів
      - name: Run Tests
        run: ./mvnw test
        continue-on-error: false  # При помилці тести зупиняються

  lint:
    runs-on: ubuntu-latest
    steps:
      # Крок 1: Завантаження репозиторію
      - name: Checkout repository
        uses: actions/checkout@v3  # Оновлено до v3

      # Крок 2: Встановлення JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v3  # Оновлено до v3
        with:
          distribution: 'temurin'  # Вказати дистрибутив Java
          java-version: 17

      # Паралельний крок 2: Запуск лінтера (наприклад, Spotless або Checkstyle)
      - name: Run Linter (Spotless)
        run: ./mvnw spotless:check
        continue-on-error: false  # При помилці форматування зупиняється
