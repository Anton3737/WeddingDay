name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgresql
          POSTGRES_PASSWORD: N4NGC7kxXmCO8LXSlYbGK4lApRt8URGi
          POSTGRES_DB: my_notes_v115
        options: >-
          --health-cmd="pg_isready -U postgresql"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'  # Це добре
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install

      - name: Run Tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://dpg-cs7fgfjtq21c73c5n7ag-a.oregon-postgres.render.com:5432/my_notes_v115
          SPRING_DATASOURCE_USERNAME: postgresql
          SPRING_DATASOURCE_PASSWORD: N4NGC7kxXmCO8LXSlYbGK4lApRt8URGi
        run: mvn test
